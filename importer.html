<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const cfg={apiKey:"AIzaSyAZJ69_Nv-oTEINkhLAxjmPjsOO6QfIFkg",authDomain:"lillofind-c455c.firebaseapp.com",projectId:"lillofind-c455c",storageBucket:"lillofind-c455c.firebasestorage.app",messagingSenderId:"49368493660",appId:"1:49368493660:web:22e02baaa3a2f1cf2a0099"};
const app=initializeApp(cfg);
window.__imp={db:getFirestore(app),auth:getAuth(app),collection,addDoc,serverTimestamp,signInWithEmailAndPassword,onAuthStateChanged};

<style>
:root{
  --k:#080808;--w:#f0f0f0;--led:#C8FF00;
  --dim:#555;--border:#1a1a1a;
  --card:#0f0f0f;--card2:#141414;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--k);color:var(--w);font-family:'IBM Plex Mono',monospace;min-height:100vh;}
.bb{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
.led-strip{height:3px;background:linear-gradient(90deg,transparent,var(--led) 30%,#00FFB2 60%,var(--led) 80%,transparent);box-shadow:0 0 10px var(--led);}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--k);z-index:999;display:flex;align-items:center;justify-content:center;}
.login-box{width:380px;padding:44px 36px;border:2px solid #1e1e1e;background:#0d0d0d;}

/* INPUTS */
.lf-in{
  width:100%;background:#0c0c0c;border:1.5px solid #222;color:var(--w);
  font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.5px;
  padding:13px 14px;outline:none;transition:border-color .15s;
}
.lf-in:focus{border-color:var(--led);}
.lf-in::placeholder{color:#333;}

/* BUTTONS */
.btn-led{
  background:var(--led);color:var(--k);border:none;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;padding:14px 28px;
  transition:opacity .15s;box-shadow:0 0 20px rgba(200,255,0,.2);
}
.btn-led:hover{opacity:.85;}
.btn-led:disabled{opacity:.35;cursor:not-allowed;}
.btn-g{
  background:var(--card2);color:#bbb;border:1.5px solid #242424;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;padding:10px 18px;transition:all .15s;
}
.btn-g:hover{border-color:var(--led);color:var(--led);}
.btn-red{
  background:rgba(255,71,87,.07);color:#FF4757;
  border:1.5px solid rgba(255,71,87,.2);
  cursor:pointer;font-family:'IBM Plex Mono',monospace;
  font-size:11px;padding:10px 14px;transition:all .15s;
}
.btn-red:hover{background:rgba(255,71,87,.16);}

/* HEADER */
#hdr{
  background:var(--k);border-bottom:2px solid var(--border);
  padding:0 28px;height:64px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:10;
}

/* BODY */
#app-body{max-width:1200px;margin:0 auto;padding:40px 24px 110px;}

/* SECTIONS */
.sec-wrap{margin-bottom:44px;padding-bottom:44px;border-bottom:1px solid #141414;}
.sec-num{font-size:10px;color:var(--led);letter-spacing:4px;margin-bottom:6px;text-transform:uppercase;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;margin-bottom:18px;line-height:1;}

/* CHIPS */
.brand-chip{
  display:inline-flex;align-items:center;padding:9px 16px;
  border:1.5px solid #1e1e1e;font-size:12px;font-weight:500;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  background:var(--card);color:#777;transition:all .15s;user-select:none;
}
.brand-chip:hover{border-color:#444;color:var(--w);}
.brand-chip.on{border-color:var(--led);background:rgba(200,255,0,.08);color:var(--led);}

.model-chip:hover{border-color:#3a3a3a;color:#bbb;}
.model-chip.on{border-color:#ccc;background:#1a1a1a;color:var(--w);font-weight:600;}

/* PRODUCT ROW */
.prod-row{
  background:var(--card);border:1.5px solid #181818;
  padding:18px 16px;margin-bottom:8px;transition:border-color .2s;
}
.prod-row:focus-within{border-color:#282828;}
.prod-row.saved-ok{border-color:rgba(200,255,0,.3);background:rgba(200,255,0,.015);}
.prod-row.saved-err{border-color:rgba(255,71,87,.3);}

.row-grid{
  display:grid;
  grid-template-columns:72px 1.6fr 1.2fr 80px 160px 1fr 1fr 38px;
  gap:12px;align-items:start;
}
.row-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#383838;margin-bottom:5px;}

/* IMAGE */
.img-prev{width:72px;height:72px;object-fit:cover;border:1px solid #1e1e1e;display:block;}
.img-ph{
  width:72px;height:72px;border:1.5px dashed #1e1e1e;background:#0a0a0a;
  display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;
}

/* SIZES */
.sz-toggle{
  display:inline-flex;align-items:center;justify-content:center;
  width:36px;height:30px;border:1.5px solid #1e1e1e;font-size:10px;font-weight:600;
  cursor:pointer;background:var(--card);color:#333;transition:all .12s;user-select:none;
}
.sz-toggle:hover{border-color:#444;color:#888;}
.sz-toggle.on{border-color:var(--led);background:rgba(200,255,0,.1);color:var(--led);}

/* STATS BAR */
#stats-bar{
  position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;
  border-top:2px solid #141414;padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;z-index:20;
}
.stat-item p:first-child{font-size:8px;color:var(--dim);letter-spacing:2px;margin-bottom:3px;text-transform:uppercase;}
.stat-item p:last-child{font-family:'Bebas Neue',sans-serif;font-size:22px;}

/* TOAST */
#toast{
  position:fixed;top:22px;left:50%;transform:translateX(-50%);
  background:var(--led);color:var(--k);padding:12px 26px;
  font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  pointer-events:none;opacity:0;transition:opacity .2s;z-index:300;white-space:nowrap;
}
#toast.show{opacity:1;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--k);}
::-webkit-scrollbar-thumb{background:#252525;}

@media(max-width:800px){
  .row-grid{grid-template-columns:60px 1fr 80px;gap:8px;}
  .row-grid>*:nth-child(n+4){grid-column:span 3;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <p style="font-size:9px;color:var(--dim);letter-spacing:4px;margin-bottom:10px;">LILLOFIND</p>
    <p class="bb" style="font-size:52px;line-height:.9;margin-bottom:4px;">IMPORTA<br>PRODOTTI</p>
    <div class="led-strip" style="margin:22px 0 30px;"></div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div>
        <p style="font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:6px;">EMAIL ADMIN</p>
        <input class="lf-in" id="lg-email" type="email" placeholder="admin@lillofind.it" autocomplete="email"/>
      </div>
      <div>
        <p style="font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:6px;">PASSWORD</p>
        <input class="lf-in" id="lg-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn-led" id="lg-btn" onclick="doLogin()" style="width:100%;margin-top:6px;font-size:13px;padding:16px;">ACCEDI →</button>
      <p id="lg-err" style="font-size:11px;color:#FF4757;display:none;margin-top:2px;"></p>
    </div>
  </div>
</div>

<!-- HEADER -->
<header id="hdr">
  <div style="display:flex;align-items:center;gap:14px;">
    <span class="bb" style="font-size:28px;letter-spacing:3px;color:var(--led);">LILLOFIND</span>
    <span style="color:#1e1e1e;">|</span>
    <span style="font-size:11px;color:#333;letter-spacing:2px;text-transform:uppercase;">Importa Prodotti</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <span id="hdr-user" style="font-size:10px;color:var(--dim);"></span>
    <a href="index.html" class="btn-g" style="text-decoration:none;">← SITO</a>
  </div>
</header>
<div class="led-strip"></div>

<div id="app-body">

  <!-- 01 BRAND -->
  <div class="sec-wrap">
    <p class="sec-num">01 — Brand</p>
    <p class="sec-title">
      SCEGLI IL BRAND
      <span id="sel-brand-lbl" style="color:var(--led);font-size:36px;"></span>
    </p>
    <div id="brand-chips" style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;"></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:10px;color:var(--dim);letter-spacing:2px;white-space:nowrap;">O SCRIVI:</span>
      <input class="lf-in" id="custom-brand" placeholder="Brand non in lista..." style="max-width:300px;font-size:13px;" oninput="onCustomBrand(this.value)"/>
    </div>
  </div>

  <!-- 02 TIPO -->
  <div class="sec-wrap">
    <p class="sec-num">02 — Tipo Prodotto</p>
    <p class="sec-title">
      COSA STAI CARICANDO?
    </p>
    <div id="model-chips" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
  </div>

  <!-- 04 RIGHE -->
  <div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;">
      <div>
        <p class="sec-num">02 — Prodotti</p>
        <p class="sec-title" style="margin-bottom:0;">
          RIGHE
          <span id="row-count-lbl" style="color:var(--dim);font-size:32px;"></span>
        </p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding-bottom:6px;">
        <button class="btn-g" onclick="addRow()">+ RIGA</button>
        <button class="btn-g" onclick="for(let i=0;i<5;i++)addRow();updateStats();">+ 5 RIGHE</button>
        <button class="btn-red" onclick="clearDone()">🗑 RIMUOVI SALVATI</button>
      </div>
    </div>

    <!-- Headers -->
    <div style="display:grid;grid-template-columns:72px 1.6fr 1.2fr 80px 160px 1fr 1fr 38px;gap:12px;padding:6px 16px 10px;" id="col-hdr">
      <span class="row-label" style="color:#2a2a2a;">IMG</span>
      <span class="row-label" style="color:#555;font-size:10px;">URL IMGBB</span>
      <span class="row-label" style="color:#555;font-size:10px;">NOME PRODOTTO *</span>
      <span class="row-label" style="color:#555;font-size:10px;">PREZZO € *</span>
      <span class="row-label" style="color:#555;font-size:10px;">TIPO</span>
      <span class="row-label" style="color:#555;font-size:10px;">TAGLIE</span>
      <span class="row-label" style="color:#555;font-size:10px;">COLORI</span>
      <span></span>
    </div>

    <div id="rows-container"></div>
  </div>

</div>

<!-- STATS BAR -->
<div id="stats-bar">
  <div style="display:flex;align-items:center;gap:28px;">
    <div class="stat-item">
      <p>Brand</p>
      <p style="color:var(--led);" id="sb-brand">—</p>
    </div>
<div style="width:1px;height:36px;background:#1a1a1a;"></div>
    <div class="stat-item">
      <p>Righe</p>
      <p id="sb-rows">0</p>
    </div>
    <div class="stat-item">
      <p style="color:var(--led);">Salvati ✓</p>
      <p style="color:var(--led);" id="sb-saved">0</p>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <p id="save-status" style="font-size:11px;color:var(--dim);letter-spacing:1px;max-width:260px;text-align:right;"></p>
    <button class="btn-led" id="save-btn" onclick="saveAll()" style="font-size:14px;padding:18px 40px;letter-spacing:3px;">
      💾 SALVA TUTTO →
    </button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
function waitFB(cb){ window.__imp ? cb() : setTimeout(()=>waitFB(cb),80); }

const IMGBB_KEY = '4e0f0e5bfe97cdcf39838aa5a82abb75';
const SIZES_ALL = ['XS','S','M','L','XL','XXL','Unica'];
let currentBrand='', rowId=0, savedCount=0, user=null;

const BRANDS = [
  'Nike','Adidas','Jordan','New Balance','Asics','Puma','Reebok','Converse',
  'Ralph Lauren','Tommy Hilfiger','Lacoste','Fred Perry','Stone Island',
  'Moncler','Canada Goose','Arc\'teryx','Patagonia','The North Face',
  'Stussy','Supreme','Palace','Carhartt WIP','Dickies','Wrangler',
  'Off-White','Vetements','Raf Simons','Rick Owens','Fear of God','Essentials',
  'Balenciaga','Gucci','Versace','Prada','Fendi','Dior','LV','Burberry','YSL',
  'Broken Planet','RTA','Alo Yoga','Lululemon','Vuori',
  'New Era','Mitchell & Ness','Kangol','Red Bull',
  'Stefano Ricci','Ferragamo','Guess','The Couture Club','Born x Raised',
  'Moschino','Marni','A.P.C.','Ami Paris','Kenzo','Isabel Marant',
  'Tuff Crowd','Derschutze','Morta','Altro',
];
const MODELS = [
  'T-Shirt','Polo','Longsleeve','Hoodie','Crewneck','Zip Hoodie',
  'Jacket','Bomber','Parka','Puffer','Vest',
  'Pants','Cargo Pants','Shorts','Jeans','Jogger',
  'Sneakers','Boots','Sandals','Slides',
  'Cap','Hat','Beanie',
  'Bag','Backpack','Belt','Wallet',
  'Set Completo','Altro',
];

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),3000);
}

// LOGIN
window.doLogin=async function(){
  const imp=window.__imp;
  const email=document.getElementById('lg-email').value.trim();
  const pass=document.getElementById('lg-pass').value;
  const btn=document.getElementById('lg-btn');
  const err=document.getElementById('lg-err');
  err.style.display='none'; btn.textContent='...'; btn.disabled=true;
  try{ await imp.signInWithEmailAndPassword(imp.auth,email,pass); }
  catch(e){ err.textContent='Email o password errati'; err.style.display='block'; btn.textContent='ACCEDI →'; btn.disabled=false; }
};

waitFB(()=>{
  window.__imp.onAuthStateChanged(window.__imp.auth, u=>{
    user=u;
    if(u){ document.getElementById('login-screen').style.display='none'; document.getElementById('hdr-user').textContent=u.email; initApp(); }
    else  { document.getElementById('login-screen').style.display='flex'; }
  });
});

function initApp(){
  for(let i=0;i<8;i++) createRow('','');
  updateStats();
  document.getElementById('brand-chips').innerHTML=BRANDS.map(b=>`<span class="brand-chip" onclick="selectBrand('${b.replace(/'/g,"\\'")}',this)">${b}</span>`).join('');
  updateStats();
}

// BRAND / MODEL
window.selectBrand=function(brand,el){
  currentBrand=brand;
  document.querySelectorAll('.brand-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('custom-brand').value='';
  document.getElementById('sel-brand-lbl').textContent='→ '+brand;
  document.getElementById('sb-brand').textContent=brand;
};
window.onCustomBrand=function(val){
  if(!val) return;
  currentBrand=val;
  document.querySelectorAll('.brand-chip').forEach(c=>c.classList.remove('on'));
  document.getElementById('sel-brand-lbl').textContent='→ '+val;
  document.getElementById('sb-brand').textContent=val;
};

// IMGBB
async function uploadToImgBB(b64){
  try{
    const form=new FormData();
    form.append('key',IMGBB_KEY);
    form.append('image', b64.startsWith('data:') ? b64.split(',')[1] : b64);
    const res=await fetch('https://api.imgbb.com/1/upload',{method:'POST',body:form});
    const json=await res.json();
    return json.success ? json.data.url : null;
  } catch(e){ return null; }
}

// CREATE ROW
window.addRow=function(){ createRow('',''); updateStats(); };

function createRow(imgUrl, fileName){
  const id=rowId++;
  const container=document.getElementById('rows-container');
  const div=document.createElement('div');
  div.className='prod-row'; div.id='row-'+id;
  if(imgUrl) div.dataset.imgUrl=imgUrl;

  let autoName='';
  if(fileName){
    autoName=fileName.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/image\s*\d+/gi,'').replace(/\s+/g,' ').trim().replace(/\b\w/g,c=>c.toUpperCase());
    if(currentBrand && !autoName.toLowerCase().includes(currentBrand.toLowerCase()))
      autoName=(currentBrand+' '+autoName).trim();
  }

  div.innerHTML=`
    <div class="row-grid">
      <div id="img-area-${id}">
        <div class="img-ph" style="cursor:default;border-color:#141414;">🖼</div>
      </div>
      <div>
        <p class="row-label">URL ImgBB (Direct Link)</p>
        <input class="lf-in" id="ru-${id}" placeholder="https://i.ibb.co/..." style="font-size:12px;"
          oninput="handleUrlInput(this,${id})" onpaste="setTimeout(()=>handleUrlInput(this,${id}),30)"/>
      </div>
      <div>
        <p class="row-label">Nome Prodotto *</p>
        <input class="lf-in" id="rn-${id}" value="${autoName}" placeholder="es. Nike Dunk Low Panda"
          style="font-size:13px;"
          onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('rp-${id}').focus();}"/>
      </div>
      <div>
        <p class="row-label">Prezzo €</p>
        <input class="lf-in" id="rp-${id}" type="number" step="0.01" min="0" placeholder="89.99"
          style="font-size:16px;font-weight:600;color:var(--led);"
          onkeydown="if(event.key==='Enter'){event.preventDefault();const nx=document.querySelector('#row-${id} ~ .prod-row input.lf-in');if(nx)nx.focus();}"/>
      </div>
      <div>
        <p class="row-label">Tipo Prodotto</p>
        <select class="lf-in" id="rt-${id}" style="font-size:11px;padding:8px 10px;cursor:pointer;background:#0c0c0c;color:#aaa;">
          <option value="">— scegli —</option>
          ${MODELS.map(m=>`<option value="${m}">${m}</option>`).join('')}
        </select>
      </div>
      <div>
        <p class="row-label">
          Taglie
          <button onclick="toggleAllSizes(${id})" style="background:none;border:none;color:var(--led);cursor:pointer;font-size:8px;letter-spacing:1px;font-family:'IBM Plex Mono',monospace;margin-left:6px;">TUTTE</button>
        </p>
        <div style="display:flex;flex-wrap:wrap;gap:3px;" id="sz-${id}">
          ${SIZES_ALL.map(s=>`<span class="sz-toggle on" onclick="this.classList.toggle('on')">${s}</span>`).join('')}
        </div>
      </div>
      <div>
        <p class="row-label">Colori</p>
        <input class="lf-in" id="rc-${id}" placeholder="Nero, Bianco, Verde" style="font-size:12px;"/>
        <p style="font-size:8px;color:#252525;margin-top:4px;letter-spacing:1px;">separati da virgola</p>
      </div>
      <div style="padding-top:20px;">
        <button class="btn-red" onclick="removeRow(${id})" style="padding:10px;font-size:14px;">✕</button>
      </div>
    </div>
    <div id="rst-${id}" style="display:none;margin-top:8px;font-size:10px;letter-spacing:2px;padding:3px 0;"></div>`;

  container.appendChild(div);
}

window.removeRow=function(id){ const el=document.getElementById('row-'+id); if(el){el.remove();updateStats();} };
window.clearDone=function(){ document.querySelectorAll('.prod-row.saved-ok').forEach(r=>r.remove()); updateStats(); toast('🗑 Rimossi'); };

window.handleInlineFile=async function(input,id){
  const file=input.files[0]; if(!file) return;
  const b64=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(file);});
  let url=b64;
  const hosted=await uploadToImgBB(b64);
  if(hosted) url=hosted;
  const ph=document.getElementById('ph-'+id);
  if(ph) ph.outerHTML=`<img class="img-prev" src="${url}" alt=""/>`;
  document.getElementById('row-'+id).dataset.imgUrl=url;
};


window.handleUrlInput = function(input, id){
  const url = input.value.trim();
  const row = document.getElementById('row-'+id);
  const imgArea = document.getElementById('img-area-'+id);
  if(!url) return;
  // Show preview
  const img = document.createElement('img');
  img.className = 'img-prev';
  img.alt = '';
  img.src = url;
  img.onerror = function(){ this.style.opacity='.2'; };
  if(imgArea){ imgArea.innerHTML=''; imgArea.appendChild(img); }
  row.dataset.imgUrl = url;
};

window.toggleAllSizes=function(id){
  const t=document.querySelectorAll('#sz-'+id+' .sz-toggle');
  const allOn=[...t].every(x=>x.classList.contains('on'));
  t.forEach(x=>{ allOn?x.classList.remove('on'):x.classList.add('on'); });
};

function getRowSizes(id){
  return [...document.querySelectorAll('#sz-'+id+' .sz-toggle.on')].map(t=>t.textContent.trim());
}

function updateStats(){
  const n=document.querySelectorAll('.prod-row').length;
  document.getElementById('row-count-lbl').textContent=n?'— '+n:'';
  document.getElementById('sb-rows').textContent=n;
  document.getElementById('sb-saved').textContent=savedCount;
}

// SAVE ALL
window.saveAll=async function(){
  if(!user){ toast('⚠️ Non autenticato'); return; }
  if(!currentBrand){ toast('⚠️ Scegli il brand al punto 01'); return; }

  const imp=window.__imp;
  const btn=document.getElementById('save-btn');
  const status=document.getElementById('save-status');
  btn.textContent='Salvando...'; btn.disabled=true;

  const rows=document.querySelectorAll('.prod-row:not(.saved-ok)');
  let saved=0,errors=0,skipped=0;

  for(const row of rows){
    const id=row.id.replace('row-','');
    const name=document.getElementById('rn-'+id)?.value.trim();
    const price=parseFloat(document.getElementById('rp-'+id)?.value);
    if(!name||isNaN(price)||price<=0){ skipped++; continue; }

    const imgUrl=row.dataset.imgUrl||document.getElementById('ru-'+id)?.value.trim()||'';
    const colorsRaw=document.getElementById('rc-'+id)?.value.trim()||'';
    const colors=colorsRaw?colorsRaw.split(',').map(c=>c.trim()).filter(Boolean):[];
    const sizes=getRowSizes(id);
    const rst=document.getElementById('rst-'+id);

    try{
      const rowModel=document.getElementById('rt-'+id)?.value||'';
      await imp.addDoc(imp.collection(imp.db,'products'),{
        name,price,brand:currentBrand,model:rowModel,style:rowModel,
        sizes:sizes.length?sizes:['S','M','L','XL'],size:sizes.join(', '),
        colors,imageUrl:imgUrl,description:'',createdAt:imp.serverTimestamp()
      });
      saved++; savedCount++;
      row.classList.add('saved-ok');
      if(rst){ rst.style.display='block'; rst.style.color='var(--led)'; rst.textContent='✅ SALVATO'; }
      status.textContent=savedCount+' salvati...';
    } catch(e){
      errors++;
      row.classList.add('saved-err');
      if(rst){ rst.style.display='block'; rst.style.color='#FF4757'; rst.textContent='❌ '+e.message; }
    }
  }

  btn.textContent='💾 SALVA TUTTO →'; btn.disabled=false;
  updateStats();
  let msg='✅ '+saved+' prodotti salvati!';
  if(skipped) msg+=' ('+skipped+' vuoti saltati)';
  if(errors)  msg+=' ⚠️ '+errors+' errori';
  toast(msg); status.textContent=msg;
  if(saved>0) setTimeout(()=>{ addRow(); updateStats(); },600);
};

document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveAll();} });
</script>
</body>
