name: Deploy Firebase Functions & Storage Rules

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'storage.rules'
      - 'firebase.json'

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Functions & Storage Rules
        run: npx firebase-tools deploy --only functions,storage --token "$FIREBASE_TOKEN" --project lillofind-c455c --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
