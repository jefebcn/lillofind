name: Deploy Firebase Functions, Hosting & Storage Rules

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'functions/**'
      - 'storage.rules'
      - 'firebase.json'
      - '*.html'

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Setup Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/gcloud-key.json

      - name: Deploy Functions, Hosting & Storage Rules
        run: npx firebase-tools deploy --only functions,hosting,storage --project lillofind-c455c --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud-key.json
