name: Deploy Firebase Hosting

# Il backend (ex Cloud Functions) è migrato su Cloudflare Workers — vedi
# cloudflare-worker/. Qui pubblichiamo SOLO l'Hosting, che è gratuito sul
# piano Spark (nessun Blaze, nessuna carta).

on:
  push:
    branches:
      - main
    paths:
      - 'firebase.json'
      - '*.html'
      - '*.js'

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/gcloud-key.json

      - name: Deploy Hosting
        run: npx firebase-tools deploy --only hosting --project lillofind-c455c --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud-key.json
